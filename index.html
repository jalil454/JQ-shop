<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#6b7c4a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="JQ">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<title>JQ — Art you wear.</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --black:#0a0a0a;--surface:#111111;--surface2:#1a1a1a;
  --olive:#6b7c4a;--olive-light:#8a9e60;--olive-dark:#4a5733;
  --cream:#e8e0d0;--cream-muted:#c8bfae;--text:#f0ece4;--text-muted:#888880;
  --border:rgba(232,224,208,0.08);--border-accent:rgba(107,124,74,0.3);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--black);color:var(--text);font-family:'Space Mono',monospace;font-size:13px;overflow-x:hidden;cursor:none;}
.cursor{position:fixed;width:8px;height:8px;background:var(--olive);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .2s,height .2s;}
.cursor-ring{position:fixed;width:32px;height:32px;border:1px solid var(--olive);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .3s,height .3s,border-color .2s;opacity:.6;}

/* PAGE TRANSITION */
#app{transition:opacity 0.25s ease;}
#app.fade{opacity:0;}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:1.5rem 3rem;background:rgba(10,10,10,0.95);border-bottom:1px solid var(--border);}
.nav-logo{cursor:none;display:flex;align-items:center;}
.nav-logo img{height:44px;width:auto;}
.nav-links{display:flex;gap:2.5rem;list-style:none;}
.nav-links a{color:var(--text-muted);text-decoration:none;font-size:11px;letter-spacing:.2em;text-transform:uppercase;transition:color .3s;cursor:none;}
.nav-links a:hover,.nav-links a.active{color:var(--cream);}
.nav-right{display:flex;align-items:center;gap:1rem;}
.nav-cart{font-size:11px;letter-spacing:.2em;color:var(--text-muted);text-transform:uppercase;cursor:none;transition:color .3s;}
.nav-cart:hover{color:var(--olive-light);}
#hamburger{display:none;background:none;border:none;color:var(--text-muted);font-size:1.4rem;cursor:pointer;padding:.3rem;}

/* HOME */
.hero{position:relative;min-height:100vh;display:flex;align-items:center;overflow:hidden;padding:0 3rem;}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 70% 50%,rgba(107,124,74,.06) 0%,transparent 60%),radial-gradient(ellipse 40% 40% at 20% 80%,rgba(107,124,74,.04) 0%,transparent 50%);}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(232,224,208,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(232,224,208,.03) 1px,transparent 1px);background-size:60px 60px;animation:gridShift 20s linear infinite;}
@keyframes gridShift{0%{transform:translateY(0)}100%{transform:translateY(60px)}}
.hero-content{position:relative;z-index:2;max-width:900px;}
.hero-eyebrow{font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--olive);margin-bottom:1.5rem;opacity:0;animation:fadeUp 1s .3s forwards;}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(5rem,12vw,11rem);line-height:.9;letter-spacing:.02em;color:var(--cream);opacity:0;animation:fadeUp 1s .5s forwards;}
.hero-title span{color:var(--olive);display:block;}
.hero-sub{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-style:italic;font-weight:300;color:var(--text-muted);margin-top:2rem;max-width:400px;line-height:1.6;opacity:0;animation:fadeUp 1s .7s forwards;}
.hero-cta{display:flex;gap:1.5rem;margin-top:3rem;opacity:0;animation:fadeUp 1s .9s forwards;}
.btn-primary{background:var(--olive);color:var(--black);padding:1rem 2.5rem;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;text-decoration:none;border:none;cursor:none;transition:background .3s,transform .2s;display:inline-block;}
.btn-primary:hover{background:var(--olive-light);transform:translateY(-2px);}
.btn-ghost{background:transparent;color:var(--cream);padding:1rem 2.5rem;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;text-decoration:none;border:1px solid rgba(232,224,208,.2);cursor:none;transition:border-color .3s,transform .2s;display:inline-block;}
.btn-ghost:hover{border-color:var(--olive);transform:translateY(-2px);}
.scroll-hint{position:absolute;bottom:2.5rem;left:3rem;display:flex;align-items:center;gap:1rem;opacity:0;animation:fadeUp 1s 1.2s forwards;}
.scroll-line{width:40px;height:1px;background:var(--olive);position:relative;overflow:hidden;}
.scroll-line::after{content:'';position:absolute;left:-100%;width:100%;height:100%;background:var(--cream);animation:scanLine 2s 1.5s ease-in-out infinite;}
@keyframes scanLine{0%{left:-100%}100%{left:100%}}
.scroll-text{font-size:10px;letter-spacing:.3em;color:var(--text-muted);text-transform:uppercase;}
.hero-number{position:absolute;right:3rem;bottom:-2rem;font-family:'Bebas Neue',sans-serif;font-size:30vw;color:transparent;-webkit-text-stroke:1px rgba(232,224,208,.04);pointer-events:none;line-height:1;opacity:0;animation:fadeIn 2s 1s forwards;}

/* TICKER */
.ticker{border-top:1px solid var(--border);border-bottom:1px solid var(--border);background:var(--surface);overflow:hidden;white-space:nowrap;padding:1rem 0;}
.ticker-inner{display:inline-block;animation:ticker 25s linear infinite;}
.ticker-inner span{display:inline-block;padding:0 2rem;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-muted);}
.ticker-inner span.dot{color:var(--olive);padding:0;}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* SECTIONS */
.section{padding:8rem 3rem;position:relative;}
.section-label{font-size:10px;letter-spacing:.4em;text-transform:uppercase;color:var(--olive);margin-bottom:1rem;}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.5rem,5vw,4.5rem);color:var(--cream);letter-spacing:.05em;margin-bottom:3rem;}

/* PRODUCTS GRID */
.products-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5px;}
.product-card{position:relative;background:var(--surface);overflow:hidden;cursor:none;}
.product-card::before{content:'';display:block;padding-top:130%;}
.product-img{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
.product-placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;transition:transform .6s cubic-bezier(.25,.46,.45,.94);}
.product-placeholder.hoodie{background:#151a10;}
.product-placeholder.tee{background:#10150a;}
.product-placeholder.pants{background:#131310;}
.product-card:hover .product-placeholder{transform:scale(1.04);}
.product-icon{font-size:3rem;opacity:.12;color:var(--olive-light);}
.placeholder-text{font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:var(--text-muted);opacity:.4;}
.product-info{position:absolute;bottom:0;left:0;right:0;padding:1.5rem;background:linear-gradient(to top,rgba(10,10,10,.95) 0%,transparent 100%);transform:translateY(20px);opacity:0;transition:opacity .4s,transform .4s;}
.product-card:hover .product-info{opacity:1;transform:translateY(0);}
.product-name{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:.05em;color:var(--cream);}
.product-price{font-size:11px;color:var(--olive-light);margin-top:.3rem;letter-spacing:.1em;}
.product-add{display:inline-block;margin-top:.8rem;padding:.5rem 1.2rem;background:var(--olive);color:var(--black);font-size:10px;letter-spacing:.2em;text-transform:uppercase;border:none;cursor:none;transition:background .2s;}
.product-add:hover{background:var(--olive-light);}
.product-tag{position:absolute;top:1rem;left:1rem;background:var(--olive);color:var(--black);font-size:9px;letter-spacing:.2em;text-transform:uppercase;padding:.3rem .7rem;}
.tag-new{background:var(--olive);color:var(--black);}
.tag-limited{background:#2a1a0a;color:#c8852a;border:1px solid #c8852a44;}
.wishlist-btn{position:absolute;top:1rem;right:1rem;background:rgba(10,10,10,.7);border:1px solid var(--border);color:var(--text-muted);width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:none;opacity:0;transform:translateX(5px);transition:opacity .3s,transform .3s,color .2s;}
.product-card:hover .wishlist-btn{opacity:1;transform:translateX(0);}
.wishlist-btn:hover{color:#c83a3a;}
.wishlist-btn.liked{color:#c83a3a;opacity:1;transform:translateX(0);}

/* ABOUT STRIP */
.about-strip{padding:8rem 3rem;border-top:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr;gap:6rem;align-items:center;}
.about-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(3rem,6vw,6rem);line-height:.95;color:var(--cream);letter-spacing:.02em;}
.about-title em{color:var(--olive);font-style:italic;font-family:'Cormorant Garamond',serif;font-weight:300;}
.about-text{font-family:'Cormorant Garamond',serif;font-size:1.25rem;font-weight:300;line-height:1.8;color:var(--text-muted);margin-bottom:2rem;}
.about-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;margin-top:3rem;padding-top:2rem;border-top:1px solid var(--border);}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:2.5rem;color:var(--olive);letter-spacing:.05em;}
.stat-label{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-muted);margin-top:.3rem;}

/* CATEGORIES */
.categories{padding:6rem 3rem;background:var(--surface);border-top:1px solid var(--border);}
.cat-grid{display:grid;grid-template-columns:2fr 1fr 1fr;gap:1.5px;margin-top:3rem;}
.cat-item{position:relative;background:var(--surface2);overflow:hidden;cursor:none;min-height:300px;display:flex;align-items:flex-end;padding:2rem;transition:background .3s;}
.cat-item:hover{background:#222;}
.cat-item::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(10,10,10,.8) 0%,transparent 60%);}
.cat-content{position:relative;z-index:1;}
.cat-name{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--cream);letter-spacing:.1em;display:block;}
.cat-count{font-size:10px;color:var(--olive-light);letter-spacing:.2em;margin-top:.3rem;}
.cat-arrow{display:inline-block;margin-top:.8rem;color:var(--olive);font-size:1.5rem;transform:rotate(-45deg);transition:transform .3s;}
.cat-item:hover .cat-arrow{transform:rotate(0deg);}

/* MARQUEE */
.marquee-section{padding:4rem 0;overflow:hidden;border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
.marquee-text{display:inline-block;white-space:nowrap;animation:marquee 15s linear infinite;}
.big-word{font-family:'Bebas Neue',sans-serif;font-size:clamp(4rem,8vw,7rem);letter-spacing:.05em;padding:0 2rem;}
.big-word.outlined{color:transparent;-webkit-text-stroke:1px var(--olive);}
.big-word.filled{color:var(--cream);}
@keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* NEWSLETTER */
.newsletter{padding:8rem 3rem;border-top:1px solid var(--border);display:flex;flex-direction:column;align-items:center;text-align:center;}
.nl-label{font-size:10px;letter-spacing:.4em;text-transform:uppercase;color:var(--olive);margin-bottom:1.5rem;}
.nl-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.5rem,5vw,4rem);color:var(--cream);letter-spacing:.05em;margin-bottom:1rem;}
.nl-sub{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-style:italic;color:var(--text-muted);margin-bottom:3rem;}
.nl-form{display:flex;width:100%;max-width:480px;}
.nl-input{flex:1;background:var(--surface);border:1px solid var(--border-accent);color:var(--text);padding:1rem 1.5rem;font-family:'Space Mono',monospace;font-size:12px;outline:none;border-right:none;transition:border-color .3s;}
.nl-input:focus{border-color:var(--olive);}
.nl-input::placeholder{color:var(--text-muted);}
.nl-btn{background:var(--olive);border:1px solid var(--olive);color:var(--black);padding:1rem 1.5rem;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.15em;text-transform:uppercase;cursor:none;transition:background .2s;white-space:nowrap;}
.nl-btn:hover{background:var(--olive-light);}

/* FOOTER */
footer{padding:4rem 3rem 2rem;border-top:1px solid var(--border);background:var(--surface);}
.footer-top{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:4rem;margin-bottom:4rem;}
.footer-tagline{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1rem;color:var(--text-muted);}
.footer-col-title{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--olive);margin-bottom:1.5rem;}
.footer-links{list-style:none;}
.footer-links li{margin-bottom:.8rem;}
.footer-links a{color:var(--text-muted);text-decoration:none;font-size:12px;transition:color .2s;cursor:none;}
.footer-links a:hover{color:var(--cream);}
.footer-bottom{display:flex;justify-content:space-between;align-items:center;padding-top:2rem;border-top:1px solid var(--border);font-size:10px;color:var(--text-muted);letter-spacing:.1em;}

/* SHOP PAGE */
.page-header{padding:10rem 3rem 4rem;border-bottom:1px solid var(--border);display:flex;align-items:flex-end;justify-content:space-between;}
.page-eyebrow{font-size:10px;letter-spacing:.4em;text-transform:uppercase;color:var(--olive);margin-bottom:.8rem;}
.page-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(4rem,8vw,7rem);letter-spacing:.02em;color:var(--cream);line-height:.9;}
.shop-layout{display:grid;grid-template-columns:240px 1fr;min-height:80vh;}
.sidebar{border-right:1px solid var(--border);padding:3rem 2rem;position:sticky;top:80px;height:calc(100vh - 80px);overflow-y:auto;}
.filter-group{margin-bottom:2.5rem;}
.filter-title{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--olive);margin-bottom:1.2rem;padding-bottom:.8rem;border-bottom:1px solid var(--border);}
.filter-options{display:flex;flex-direction:column;gap:.6rem;}
.filter-btn{background:none;border:none;color:var(--text-muted);font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.1em;text-align:left;padding:.4rem 0;cursor:none;transition:color .2s;display:flex;justify-content:space-between;align-items:center;}
.filter-btn:hover{color:var(--cream);}
.filter-btn.active{color:var(--olive-light);}
.filter-btn .count{font-size:10px;color:var(--text-muted);background:var(--surface2);padding:.15rem .5rem;}
.filter-btn.active .count{background:var(--olive-dark);color:var(--olive-light);}
.size-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.size-btn{background:var(--surface);border:1px solid var(--border);color:var(--text-muted);font-family:'Space Mono',monospace;font-size:10px;padding:.4rem 0;text-align:center;cursor:none;transition:all .2s;}
.size-btn:hover{border-color:var(--olive);color:var(--cream);}
.size-btn.active{background:var(--olive);border-color:var(--olive);color:var(--black);}
.price-range{display:flex;flex-direction:column;gap:.8rem;}
.price-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--text-muted);}
.price-slider{-webkit-appearance:none;width:100%;height:2px;background:var(--surface2);outline:none;cursor:none;}
.price-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:var(--olive);border-radius:50%;cursor:none;}
.shop-main{padding:2rem 3rem;}
.sort-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border);}
.active-filters{display:flex;gap:.5rem;flex-wrap:wrap;}
.sort-select{background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'Space Mono',monospace;font-size:11px;padding:.5rem 1rem;cursor:none;outline:none;}
.view-controls{display:flex;gap:.5rem;}
.view-btn{background:none;border:1px solid var(--border);color:var(--text-muted);padding:.5rem .8rem;cursor:none;font-size:14px;transition:all .2s;}
.view-btn:hover,.view-btn.active{border-color:var(--olive);color:var(--olive-light);}
.sort-right{display:flex;gap:1rem;align-items:center;}
.full-products-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5px;transition:all .3s;}
.full-products-grid.two-col{grid-template-columns:repeat(2,1fr);}
.full-products-grid.four-col{grid-template-columns:repeat(4,1fr);}
.product-overlay{position:absolute;inset:0;background:rgba(10,10,10,.5);opacity:0;transition:opacity .4s;display:flex;align-items:center;justify-content:center;}
.product-card:hover .product-overlay{opacity:1;}
.quick-view{background:var(--cream);color:var(--black);font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;padding:.8rem 1.5rem;border:none;cursor:none;transform:translateY(10px);transition:transform .3s .1s,background .2s;}
.product-card:hover .quick-view{transform:translateY(0);}
.tag-sold{background:#1a0a0a;color:#c83a3a;border:1px solid #c83a3a44;}
.add-btn{width:100%;margin-top:.8rem;background:var(--olive);border:none;color:var(--black);font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;padding:.6rem;cursor:none;transform:translateY(5px);opacity:0;transition:transform .3s .05s,opacity .3s .05s,background .2s;}
.product-card:hover .add-btn{transform:translateY(0);opacity:1;}
.add-btn:hover{background:var(--olive-light);}
.add-btn.sold{background:var(--surface2);color:var(--text-muted);}
.product-meta{display:flex;justify-content:space-between;align-items:center;margin-top:.3rem;}
.product-cat{font-size:9px;color:var(--text-muted);letter-spacing:.15em;text-transform:uppercase;}
.load-more{text-align:center;padding:4rem 0;border-top:1px solid var(--border);margin-top:1.5px;}
.load-btn{background:none;border:1px solid var(--border-accent);color:var(--text-muted);font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;padding:1rem 3rem;cursor:none;transition:all .3s;}
.load-btn:hover{border-color:var(--olive);color:var(--olive-light);}

/* MODAL */
.modal-backdrop{position:fixed;inset:0;background:rgba(5,5,5,.92);z-index:200;opacity:0;pointer-events:none;transition:opacity .4s;overflow-y:auto;display:flex;align-items:center;justify-content:center;padding:2rem;}
.modal-backdrop.open{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border:1px solid var(--border);width:100%;max-width:900px;display:grid;grid-template-columns:1fr 1fr;transform:translateY(30px);transition:transform .4s;position:relative;}
.modal-backdrop.open .modal{transform:translateY(0);}
.modal-close{position:absolute;top:1.5rem;right:1.5rem;background:none;border:1px solid var(--border);color:var(--text-muted);width:36px;height:36px;font-size:18px;cursor:none;transition:all .2s;display:flex;align-items:center;justify-content:center;z-index:10;}
.modal-close:hover{border-color:var(--olive);color:var(--cream);}
.modal-img{background:var(--surface2);min-height:500px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem;}
.modal-img-icon{font-size:5rem;opacity:.1;color:var(--olive-light);}
.modal-content{padding:3rem 2.5rem;}
.modal-cat{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--olive);margin-bottom:.8rem;}
.modal-name{font-family:'Bebas Neue',sans-serif;font-size:2.5rem;letter-spacing:.05em;color:var(--cream);line-height:1;margin-bottom:1rem;}
.modal-price{font-size:1.2rem;color:var(--olive-light);letter-spacing:.1em;margin-bottom:2rem;}
.modal-desc{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:300;color:var(--text-muted);line-height:1.8;margin-bottom:2rem;padding-bottom:2rem;border-bottom:1px solid var(--border);}
.modal-section-label{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.8rem;}
.modal-sizes{display:flex;gap:.5rem;margin-bottom:2rem;flex-wrap:wrap;}
.modal-size{background:var(--surface2);border:1px solid var(--border);color:var(--text-muted);font-family:'Space Mono',monospace;font-size:11px;padding:.5rem 1rem;cursor:none;transition:all .2s;}
.modal-size:hover{border-color:var(--olive);color:var(--cream);}
.modal-size.active{background:var(--olive);border-color:var(--olive);color:var(--black);}
.modal-size.unavail{opacity:.3;cursor:not-allowed;text-decoration:line-through;}
.modal-add{width:100%;padding:1.2rem;background:var(--olive);border:none;color:var(--black);font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.2em;text-transform:uppercase;cursor:none;transition:background .2s;margin-bottom:1rem;}
.modal-add:hover{background:var(--olive-light);}
.modal-details{display:grid;grid-template-columns:1fr 1fr;gap:.5rem 1rem;margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid var(--border);}
.modal-detail-item{font-size:10px;color:var(--text-muted);letter-spacing:.1em;}
.modal-detail-item span{color:var(--cream);display:block;margin-top:.2rem;font-size:11px;}

/* ABOUT PAGE */
.about-hero{min-height:100vh;display:flex;flex-direction:column;justify-content:flex-end;padding:0 3rem 6rem;position:relative;overflow:hidden;}
.about-hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 60% 80% at 80% 20%,rgba(107,124,74,.07) 0%,transparent 60%);}
.lines-deco{position:absolute;top:0;right:15%;width:1px;height:100%;background:linear-gradient(to bottom,transparent 0%,var(--border-accent) 30%,var(--border-accent) 70%,transparent 100%);}
.about-hero-eyebrow{font-size:10px;letter-spacing:.4em;text-transform:uppercase;color:var(--olive);margin-bottom:2rem;position:relative;z-index:2;opacity:0;animation:fadeUp 1s .3s forwards;}
.about-hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(5rem,13vw,12rem);line-height:.88;letter-spacing:.02em;color:var(--cream);position:relative;z-index:2;opacity:0;animation:fadeUp 1s .5s forwards;max-width:900px;}
.about-hero-title em{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;color:var(--olive);display:block;}
.bg-word{position:absolute;top:50%;right:-2rem;transform:translateY(-50%);font-family:'Bebas Neue',sans-serif;font-size:35vw;color:transparent;-webkit-text-stroke:1px rgba(232,224,208,.03);pointer-events:none;line-height:1;z-index:1;}
.manifesto{padding:10rem 3rem;display:grid;grid-template-columns:1fr 1fr;gap:8rem;align-items:center;border-top:1px solid var(--border);}
.manifesto-number{font-family:'Bebas Neue',sans-serif;font-size:8rem;color:transparent;-webkit-text-stroke:1px var(--border-accent);line-height:1;margin-bottom:-1rem;}
.manifesto-label{font-size:10px;letter-spacing:.4em;text-transform:uppercase;color:var(--olive);margin-bottom:1.5rem;}
.manifesto-quote{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,3.5vw,3rem);font-weight:300;font-style:italic;color:var(--cream);line-height:1.3;}
.manifesto-quote strong{font-weight:600;color:var(--olive);font-style:normal;}
.manifesto-text{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:300;color:var(--text-muted);line-height:1.9;margin-bottom:1.5rem;}
.timeline-section{padding:8rem 3rem;background:var(--surface);border-top:1px solid var(--border);}
.timeline{position:relative;padding-left:3rem;}
.timeline::before{content:'';position:absolute;left:0;top:0;bottom:0;width:1px;background:linear-gradient(to bottom,var(--olive),var(--border));}
.timeline-item{position:relative;margin-bottom:5rem;padding-left:3rem;}
.timeline-dot{position:absolute;left:-3.4rem;top:.4rem;width:8px;height:8px;border-radius:50%;background:var(--olive);border:2px solid var(--black);box-shadow:0 0 0 1px var(--olive);}
.timeline-year{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:var(--olive);letter-spacing:.1em;margin-bottom:.5rem;}
.timeline-event{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:400;color:var(--cream);margin-bottom:.5rem;}
.timeline-desc{font-size:11px;color:var(--text-muted);line-height:1.8;letter-spacing:.03em;max-width:500px;}
.values-section{padding:8rem 3rem;border-top:1px solid var(--border);}
.values-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5px;margin-top:4rem;}
.value-card{background:var(--surface);padding:3rem 2.5rem;position:relative;overflow:hidden;}
.value-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:transparent;transition:background .4s;}
.value-card:hover::before{background:var(--olive);}
.value-num{font-family:'Bebas Neue',sans-serif;font-size:4rem;color:transparent;-webkit-text-stroke:1px var(--border-accent);line-height:1;margin-bottom:1.5rem;}
.value-title{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:var(--cream);letter-spacing:.05em;margin-bottom:1rem;}
.value-text{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:300;color:var(--text-muted);line-height:1.8;}
.stats-band{background:var(--olive-dark);padding:5rem 3rem;display:grid;grid-template-columns:repeat(4,1fr);gap:2rem;text-align:center;}
.stat-num2{font-family:'Bebas Neue',sans-serif;font-size:4rem;color:var(--cream);letter-spacing:.05em;display:block;}
.stat-label2{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:rgba(232,224,208,.5);margin-top:.5rem;}
.process-section{padding:8rem 3rem;border-top:1px solid var(--border);}
.process-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1.5px;margin-top:4rem;}
.process-step{background:var(--surface2);padding:2.5rem 2rem;position:relative;}
.process-step:not(:last-child)::after{content:'→';position:absolute;right:-12px;top:2.5rem;color:var(--olive);opacity:.4;font-size:1rem;z-index:1;}
.process-step-num{font-family:'Bebas Neue',sans-serif;font-size:3.5rem;color:var(--olive);opacity:.4;line-height:1;margin-bottom:1.5rem;}
.process-step-title{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--cream);letter-spacing:.05em;margin-bottom:.8rem;}
.process-step-text{font-size:11px;color:var(--text-muted);line-height:1.8;letter-spacing:.03em;}
.full-quote{padding:10rem 3rem;text-align:center;border-top:1px solid var(--border);position:relative;overflow:hidden;}
.fq-text{font-family:'Cormorant Garamond',serif;font-size:clamp(1.8rem,4vw,3.5rem);font-style:italic;font-weight:300;color:var(--cream);line-height:1.4;max-width:800px;margin:0 auto 2rem;position:relative;z-index:1;}
.fq-author{font-size:10px;letter-spacing:.4em;text-transform:uppercase;color:var(--olive);}
.about-cta{padding:8rem 3rem;background:var(--surface);border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.cta-label{font-size:10px;letter-spacing:.4em;text-transform:uppercase;color:var(--olive);margin-bottom:1rem;}
.cta-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.5rem,5vw,4rem);color:var(--cream);letter-spacing:.05em;line-height:1;}

/* CONTACT PAGE */
.contact-hero{padding:14rem 3rem 6rem;position:relative;overflow:hidden;border-bottom:1px solid var(--border);}
.contact-layout{display:grid;grid-template-columns:1fr 1fr;min-height:80vh;}
.contact-info{padding:6rem 4rem 6rem 3rem;border-right:1px solid var(--border);}
.info-label{font-size:10px;letter-spacing:.4em;text-transform:uppercase;color:var(--olive);margin-bottom:3rem;}
.info-block{margin-bottom:3rem;padding-bottom:3rem;border-bottom:1px solid var(--border);}
.info-block-title{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--text-muted);margin-bottom:1rem;}
.info-block-value{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:300;color:var(--cream);line-height:1.7;}
.info-block-value a{color:var(--olive-light);text-decoration:none;}
.social-links{display:flex;flex-direction:column;gap:.8rem;}
.social-link{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.2rem;background:var(--surface);border:1px solid var(--border);text-decoration:none;color:var(--text-muted);font-size:11px;letter-spacing:.15em;text-transform:uppercase;transition:all .3s;cursor:none;}
.social-link:hover{border-color:var(--olive);color:var(--cream);padding-left:1.5rem;}
.social-arrow{color:var(--olive);font-size:14px;transition:transform .3s;}
.social-link:hover .social-arrow{transform:translateX(4px);}
.contact-form-wrap{padding:6rem 3rem 6rem 4rem;}
.form-label{font-size:10px;letter-spacing:.4em;text-transform:uppercase;color:var(--olive);margin-bottom:3rem;display:block;}
.topic-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:2rem;}
.topic-btn{background:var(--surface);border:1px solid var(--border);color:var(--text-muted);font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.15em;text-transform:uppercase;padding:.8rem;cursor:none;transition:all .25s;text-align:left;}
.topic-btn:hover{border-color:var(--border-accent);color:var(--cream);}
.topic-btn.active{background:var(--olive-dark);border-color:var(--olive);color:var(--olive-light);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.form-group{margin-bottom:1.5rem;}
.form-group label{display:block;font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.6rem;}
.form-group input,.form-group textarea{width:100%;background:var(--surface);border:1px solid var(--border);border-bottom-color:rgba(232,224,208,.15);color:var(--text);font-family:'Space Mono',monospace;font-size:12px;padding:.9rem 1rem;outline:none;transition:border-color .3s;resize:none;}
.form-group input:focus,.form-group textarea:focus{border-color:var(--olive);}
.form-group input::placeholder,.form-group textarea::placeholder{color:var(--text-muted);opacity:.5;}
.form-group textarea{min-height:140px;line-height:1.7;}
.char-count{font-size:10px;color:var(--text-muted);text-align:right;margin-top:.4rem;}
.form-submit{display:flex;justify-content:space-between;align-items:center;margin-top:2rem;padding-top:2rem;border-top:1px solid var(--border);}
.form-note{font-size:10px;color:var(--text-muted);line-height:1.6;max-width:220px;}
.submit-btn{background:var(--olive);border:none;color:var(--black);font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;padding:1.2rem 2.5rem;cursor:none;transition:background .3s,transform .2s;}
.submit-btn:hover{background:var(--olive-light);}
.success-msg{display:none;text-align:center;padding:4rem 2rem;}
.success-msg.show{display:block;}
.success-icon{font-size:3rem;color:var(--olive);margin-bottom:1.5rem;display:block;}
.success-title{font-family:'Bebas Neue',sans-serif;font-size:2.5rem;color:var(--cream);letter-spacing:.05em;margin-bottom:1rem;}
.success-text{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-style:italic;color:var(--text-muted);line-height:1.7;}
.faq-section{padding:8rem 3rem;border-top:1px solid var(--border);background:var(--surface);}
.faq-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5px;}
.faq-item{background:var(--surface2);padding:2rem 2.5rem;cursor:none;border-top:2px solid transparent;transition:border-color .3s;}
.faq-item:hover{border-color:var(--olive);}
.faq-q{font-size:12px;letter-spacing:.05em;color:var(--cream);margin-bottom:.8rem;line-height:1.5;}
.faq-a{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:300;color:var(--text-muted);line-height:1.7;}

/* IMPRESSUM */
.content{max-width:800px;margin:0 auto;padding:6rem 3rem;}
.section-block{margin-bottom:4rem;padding-bottom:4rem;border-bottom:1px solid var(--border);}
.block-label{font-size:10px;letter-spacing:.4em;text-transform:uppercase;color:var(--olive);margin-bottom:1.5rem;}
.block-title{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--cream);letter-spacing:.05em;margin-bottom:1.5rem;}
.block-text{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:300;color:var(--text-muted);line-height:1.9;}
.block-text strong{color:var(--cream);font-weight:400;}
.block-text a{color:var(--olive-light);text-decoration:none;}
.info-grid{display:grid;grid-template-columns:180px 1fr;gap:.6rem 2rem;}
.info-label-col{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-muted);padding:.5rem 0;border-bottom:1px solid var(--border);}
.info-value-col{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:300;color:var(--cream);padding:.5rem 0;border-bottom:1px solid var(--border);}
.notice-box{background:var(--surface);border:1px solid var(--border-accent);border-left:3px solid var(--olive);padding:1.5rem 2rem;margin-top:2rem;}
.notice-box p{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:300;color:var(--text-muted);line-height:1.7;}

/* REVEAL */
.reveal{opacity:0;transform:translateY(35px);transition:opacity .8s,transform .8s;}
.reveal.visible{opacity:1;transform:translateY(0);}

/* MOBILE */
@media(max-width:768px){
  nav{padding:1.2rem 1.5rem;}
  .nav-links{display:none;}
  #hamburger{display:block!important;}
  .hero{padding:0 1.5rem;min-height:100svh;}
  .hero-title{font-size:clamp(3.5rem,18vw,6rem);}
  .hero-cta{flex-direction:column;gap:1rem;}
  .hero-number{font-size:50vw;right:0;}
  .scroll-hint{left:1.5rem;}
  .section{padding:5rem 1.5rem;}
  .products-grid{grid-template-columns:repeat(2,1fr);gap:1px;}
  .about-strip{grid-template-columns:1fr;gap:3rem;padding:5rem 1.5rem;}
  .categories{padding:5rem 1.5rem;}
  .cat-grid{grid-template-columns:1fr;}
  .newsletter{padding:5rem 1.5rem;}
  .nl-form{flex-direction:column;}
  .nl-input{border-right:1px solid var(--border-accent);border-bottom:none;}
  footer{padding:3rem 1.5rem 2rem;}
  .footer-top{grid-template-columns:1fr 1fr;gap:2rem;}
  .footer-bottom{flex-direction:column;gap:.5rem;text-align:center;}
  .page-header{padding:7rem 1.5rem 3rem;flex-direction:column;align-items:flex-start;gap:1rem;}
  .shop-layout{grid-template-columns:1fr;}
  .sidebar{position:static;height:auto;border-right:none;border-bottom:1px solid var(--border);padding:2rem 1.5rem;display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;}
  .shop-main{padding:1.5rem;}
  .sort-bar{flex-direction:column;align-items:flex-start;gap:1rem;}
  .sort-right{width:100%;justify-content:space-between;}
  .full-products-grid{grid-template-columns:repeat(2,1fr);gap:1px;}
  .modal{grid-template-columns:1fr;}
  .modal-img{min-height:250px;}
  .modal-content{padding:2rem 1.5rem;}
  .about-hero{padding:0 1.5rem 5rem;min-height:100svh;}
  .about-hero-title{font-size:clamp(3.5rem,16vw,6rem);}
  .manifesto{grid-template-columns:1fr;gap:3rem;padding:6rem 1.5rem;}
  .timeline-section{padding:5rem 1.5rem;}
  .values-section{padding:5rem 1.5rem;}
  .values-grid{grid-template-columns:1fr;}
  .stats-band{grid-template-columns:repeat(2,1fr);padding:3rem 1.5rem;gap:2rem;}
  .process-section{padding:5rem 1.5rem;}
  .process-grid{grid-template-columns:1fr 1fr;}
  .full-quote{padding:6rem 1.5rem;}
  .about-cta{flex-direction:column;gap:2.5rem;padding:5rem 1.5rem;}
  .contact-hero{padding:9rem 1.5rem 4rem;}
  .contact-layout{grid-template-columns:1fr;}
  .contact-info{border-right:none;border-bottom:1px solid var(--border);padding:4rem 1.5rem;}
  .contact-form-wrap{padding:4rem 1.5rem;}
  .topic-grid{grid-template-columns:1fr 1fr;}
  .form-row{grid-template-columns:1fr;}
  .form-submit{flex-direction:column;gap:1.5rem;align-items:flex-start;}
  .submit-btn{width:100%;}
  .faq-section{padding:5rem 1.5rem;}
  .faq-grid{grid-template-columns:1fr;}
  .content{padding:4rem 1.5rem;}
  .info-grid{grid-template-columns:1fr;}
}
@media(max-width:480px){
  .products-grid,.full-products-grid{grid-template-columns:1fr;}
  .footer-top{grid-template-columns:1fr;}
  .sidebar{grid-template-columns:1fr;}
  .process-grid{grid-template-columns:1fr;}
}

@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
</style>
</head>
<body>
<div class="cursor" id="cursor"></div>

<nav>

<div id="app"></div>

<!-- MODAL -->
<div class="modal-backdrop" id="modalBackdrop" onclick="closeModalOutside(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div class="modal-img">

  <a href="#" onclick="navigate('home');closeMobile();return false;" style="font-family:'Bebas Neue',sans-serif;font-size:3rem;color:var(--cream);text-decoration:none;letter-spacing:.1em;">Home</a>
  <a href="#" onclick="navigate('shop');closeMobile();return false;" style="font-family:'Bebas Neue',sans-serif;font-size:3rem;color:var(--cream);text-decoration:none;letter-spacing:.1em;">Shop</a>
  <a href="#" onclick="navigate('about');closeMobile();return false;" style="font-family:'Bebas Neue',sans-serif;font-size:3rem;color:var(--cream);text-decoration:none;letter-spacing:.1em;">About</a>
  <a href="#" onclick="navigate('contact');closeMobile();return false;" style="font-family:'Bebas Neue',sans-serif;font-size:3rem;color:var(--cream);text-decoration:none;letter-spacing:.1em;">Contact</a>

<!-- PWA INSTALL BANNER -->
<div id="installBanner" style="display:none;position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);z-index:500;background:#111;border:1px solid rgba(107,124,74,0.4);padding:1rem 1.5rem;align-items:center;gap:1.5rem;min-width:300px;max-width:90vw;box-shadow:0 8px 32px rgba(0,0,0,0.6);">

<script>
// ─── CURSOR ───
const cursor=document.getElementById('cursor');
const ring=document.getElementById('cursorRing');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cursor.style.left=mx+'px';cursor.style.top=my+'px';});
function animRing(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(animRing);}
animRing();
function setCursorHover(els){els.forEach(el=>{el.addEventListener('mouseenter',()=>{cursor.style.width='12px';cursor.style.height='12px';ring.style.width='48px';ring.style.height='48px';ring.style.borderColor='var(--cream)';});el.addEventListener('mouseleave',()=>{cursor.style.width='8px';cursor.style.height='8px';ring.style.width='32px';ring.style.height='32px';ring.style.borderColor='var(--olive)';});});}

// ─── CART ───
let cartCount=0;
function updateCart(){document.getElementById('cartDisplay').textContent='Cart ('+cartCount+')';}

// ─── MOBILE MENU ───
function openMobile(){document.getElementById('mobileMenu').style.display='flex';document.body.style.overflow='hidden';}
function closeMobile(){document.getElementById('mobileMenu').style.display='none';document.body.style.overflow='';}

// ─── PWA INSTALL ───
var deferredPrompt;
var isInstalled=window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone===true;
if(!isInstalled){
  window.addEventListener('beforeinstallprompt',function(e){
    e.preventDefault();deferredPrompt=e;
    setTimeout(function(){var b=document.getElementById('installBanner');if(b)b.style.display='flex';},4000);
  });
}
var installBtn=document.getElementById('installBtn');
if(installBtn){installBtn.addEventListener('click',async function(){if(!deferredPrompt)return;deferredPrompt.prompt();var result=await deferredPrompt.userChoice;deferredPrompt=null;var b=document.getElementById('installBanner');if(b)b.style.display='none';});}
window.addEventListener('appinstalled',function(){var b=document.getElementById('installBanner');if(b)b.style.display='none';deferredPrompt=null;});

// ─── REVEAL ───
function initReveal(){
  const obs=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('visible');});},{threshold:.1});
  document.querySelectorAll('.reveal,.timeline-item,.value-card,.process-step').forEach(r=>obs.observe(r));
}

// ─── MODAL ───
const icons={hoodie:'◉',tee:'◈',pants:'◇'};
const mats={hoodie:'400gsm Cotton Fleece',tee:'220gsm Cotton',pants:'Heavy Cotton Twill'};
const fits={hoodie:'Oversized',tee:'Regular / Oversized',pants:'Wide Leg / Relaxed'};
function openModal(name,cat,price,desc,type){
  document.getElementById('modalName').textContent=name;
  document.getElementById('modalCat').textContent=cat;
  document.getElementById('modalPrice').textContent=price;
  document.getElementById('modalDesc').textContent=desc;
  document.getElementById('modalIcon').textContent=icons[type]||'◈';
  document.getElementById('modalImgLabel').textContent=cat;
  document.getElementById('modalMat').textContent=mats[type]||'Cotton';
  document.getElementById('modalFit').textContent=fits[type]||'Regular';
  document.getElementById('modalBackdrop').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(){document.getElementById('modalBackdrop').classList.remove('open');document.body.style.overflow='';}
function closeModalOutside(e){if(e.target.id==='modalBackdrop')closeModal();}
function selectSize(btn){document.querySelectorAll('.modal-size:not(.unavail)').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
function addFromModal(){
  cartCount++;updateCart();
  const name=document.getElementById('modalName').textContent;
  const price=document.getElementById('modalPrice').textContent.replace('€ ','').trim();
  const btn=document.querySelector('.modal-add');
  btn.textContent='✓ Added to Cart';btn.style.background='var(--olive-dark)';
  setTimeout(()=>{
    btn.textContent='Add to Cart';btn.style.background='';closeModal();
    const url=`https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=jalil.qesmi.2009@gmail.com&item_name=${encodeURIComponent(name)}&amount=${price}&currency_code=EUR`;
    window.open(url,'_blank');
  },800);
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

function addToCart(btn){
  cartCount++;updateCart();
  btn.textContent='✓ Added';btn.style.background='var(--olive-dark)';
  setTimeout(()=>{btn.textContent='Add to Cart';btn.style.background='';},1500);
}
function toggleWish(btn){btn.classList.toggle('liked');btn.textContent=btn.classList.contains('liked')?'♥':'♡';}
function filterCat(btn,cat){
  document.querySelectorAll('[data-filter]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  let visible=0;
  document.querySelectorAll('.product-card').forEach(c=>{
    if(cat==='all'||c.dataset.cat===cat){c.classList.remove('hidden');visible++;}
    else c.classList.add('hidden');
  });
  const cd=document.getElementById('countDisplay');
  if(cd)cd.textContent=visible+' products';
}
function toggleSize(btn){btn.classList.toggle('active');}
function toggleFilter(btn){btn.classList.toggle('active');}
function updatePrice(val){const el=document.getElementById('priceMax');if(el)el.textContent='€ '+val;}
function removeTag(x){x.parentElement.remove();}
function setView(btn,cols){
  document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const g=document.getElementById('productsGrid');
  if(!g)return;
  g.className='full-products-grid';
  if(cols===2)g.classList.add('two-col');
  if(cols===4)g.classList.add('four-col');
}
function selectTopic(btn){document.querySelectorAll('.topic-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
function countChars(){const el=document.getElementById('messageInput');const cc=document.getElementById('charCount');if(el&&cc)cc.textContent=el.value.length;}
function submitForm(){
  const btn=document.getElementById('submitBtn');
  const email=document.getElementById('emailInput');
  const msg=document.getElementById('messageInput');
  if(!email||!msg||!email.value||!msg.value){
    if(btn){btn.textContent='Fill all fields';btn.style.background='#3a1a1a';btn.style.color='#c87a7a';setTimeout(()=>{btn.textContent='Send Message';btn.style.background='';btn.style.color='';},2000);}
    return;
  }
  if(btn){btn.textContent='Sending...';btn.style.background='var(--olive-dark)';}
  setTimeout(()=>{
    const fc=document.getElementById('formContent');
    const sm=document.getElementById('successMsg');
    if(fc)fc.style.display='none';
    if(sm)sm.classList.add('show');
  },1500);
}

// ─── NAVIGATE ───
let currentPage = 'home';
function navigate(page) {
  if(page === currentPage) { window.scrollTo({top:0,behavior:'smooth'}); return; }
  const app = document.getElementById('app');
  app.classList.add('fade');
  setTimeout(() => {
    currentPage = page;
    app.innerHTML = pages[page]() + footerHTML;
    app.classList.remove('fade');
    window.scrollTo({top:0,behavior:'instant'});
    // Update active nav
    ['shop','about','contact'].forEach(p => {
      const el = document.getElementById('nav-'+p);
      if(el) el.style.color = p === page ? 'var(--cream)' : '';
    });
    // Re-init interactions
    setCursorHover(document.querySelectorAll('a,button,.product-card,.cat-item,.faq-item'));
    initReveal();
  }, 250);
}

// ─── INIT ───
navigate('home');
setCursorHover(document.querySelectorAll('a,button'));
